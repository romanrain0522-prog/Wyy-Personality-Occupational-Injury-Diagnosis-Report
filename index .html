<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>网抑云人格工伤鉴定报告</title>
  <style>
    :root {
      --bg: #f6faf6;
      --panel: #ffffff;
      --text: #1e2a22;
      --muted: #6a786f;
      --line: #dbe8dd;
      --soft: #edf6ef;
      --accent: #6c8d71;
      --accent-strong: #4d6a53;
      --shadow: 0 16px 40px rgba(47, 73, 55, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, #f8fff8 0, #f6faf6 36%, #f2f7f3 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-top: 20px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(127,165,134,0.16), rgba(127,165,134,0.02));
      pointer-events: none;
    }

    h1, h2, h3, p { margin: 0; }
    .hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      max-width: 680px;
    }
    .hero .sub {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
      max-width: 720px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }
    .hero-minimal {
      min-height: 48vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 42px 20px;
    }
    .hero-minimal::after { display: none; }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      font: inherit;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .btn-primary {
      background: var(--accent-strong);
      color: #fff;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(77, 106, 83, 0.18);
      font-weight: 700;
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent-strong);
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .test-wrap,
    .result-wrap {
      margin-top: 22px;
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .progress {
      flex: 1;
      min-width: 240px;
      height: 10px;
      background: #edf3ee;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #97b59c, #5b7a62);
      border-radius: inherit;
      transition: width .22s ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .question-list {
      display: grid;
      gap: 16px;
    }

    .question {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--soft);
      border: 1px solid var(--line);
    }

    .question-title {
      font-size: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }

    .option:hover {
      border-color: #bcd0c1;
      background: #f8fcf9;
    }

    .option input {
      margin-top: 3px;
      accent-color: var(--accent-strong);
      transform: scale(1.1);
      flex-shrink: 0;
    }

    .option-code {
      font-weight: 800;
      color: var(--accent-strong);
      min-width: 22px;
    }

    .actions-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 6px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .result-layout {
      display: grid;
      gap: 18px;
    }
    .result-top {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: stretch;
    }
    .poster-box, .type-box, .analysis-box, .dim-box, .note-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
    }
    .poster-box {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 280px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(127,165,134,0.16), rgba(127,165,134,0) 40%),
        linear-gradient(180deg, #ffffff, #f7fbf8);
    }
    .poster-box::after {
      content: "";
      position: absolute;
      right: -46px;
      bottom: -46px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(127,165,134,0.12), rgba(127,165,134,0.01));
      pointer-events: none;
    }
    .poster-image {
      width: 100%;
      min-height: 220px;
      max-height: 460px;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.75);
      position: relative;
      z-index: 1;
    }
    .poster-box.no-image .poster-image { display: none; }
    .poster-caption {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }
    .type-kicker {
      font-size: 12px;
      color: var(--accent-strong);
      margin-bottom: 8px;
      letter-spacing: .06em;
    }
    .type-name {
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }
    .type-subname {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 14px;
      line-height: 1.4;
    }
    .analysis-box h3, .dim-box h3, .note-box h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }
    .analysis-box p {
      margin: 0;
      color: #304034;
      font-size: 15px;
      line-height: 1.9;
      white-space: pre-wrap;
    }
    .dim-list {
      display: grid;
      gap: 12px;
    }
    .dim-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }
    .dim-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .dim-item-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .dim-item-score {
      color: var(--accent-strong);
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
    }
    .dim-item p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .note-box p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .author-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
      overflow: hidden;
    }
    .author-box summary {
      list-style: none;
      cursor: pointer;
      padding: 18px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .author-box summary::-webkit-details-marker { display: none; }
    .author-box summary::after {
      content: '展开';
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-strong);
      border: 1px solid var(--line);
      background: var(--soft);
      padding: 6px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .author-box[open] summary::after {
      content: '收起';
    }
    .author-content {
      border-top: 1px solid var(--line);
      padding: 0 18px 18px;
    }
    .author-content p {
      margin: 14px 0 0;
      color: #304034;
      font-size: 14px;
      line-height: 1.9;
    }

    .result-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    @media (max-width: 860px) {
      .result-top { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .shell { padding: 14px 12px 42px; }
      .hero, .test-wrap, .result-wrap { padding: 16px; }
      .hero h1 { font-size: 32px; }
      .question-title { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section id="intro" class="screen active">
      <div class="hero card hero-minimal">
        <h1>网抑云人格工伤鉴定报告</h1>
        <p class="sub">戴上耳机的那一刻，你的工伤就开始了。</p>
        <div class="hero-actions">
          <button id="startBtn" class="btn-primary">开始鉴定</button>
        </div>
        <div style="padding-top: 2rem; display: flex; flex-direction: column;">
          <span style="color: var(--muted); font-size: 12px;">基于SBTI算法架构改造</span>
        </div>
      </div>
    </section>

    <section id="test" class="screen">
      <div class="test-wrap card">
        <div class="topbar">
          <div class="progress"><span id="progressBar"></span></div>
          <div class="progress-text" id="progressText">0 / 26</div>
        </div>

        <div id="questionList" class="question-list"></div>

        <div class="actions-bottom">
          <div class="hint" id="testHint">全选完才会放行。工伤鉴定要完整。</div>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
            <button id="submitBtn" class="btn-primary" disabled>提交并查看报告</button>
          </div>
        </div>
      </div>
    </section>

    <section id="result" class="screen">
      <div class="result-wrap card">
        <div class="result-layout">
          <div class="result-top">
            <div class="poster-box" id="posterBox">
              <img id="posterImage" class="poster-image" alt="鉴定结果图" />
              <div id="posterCaption" class="poster-caption">副歌依赖症晚期</div>
            </div>

            <div class="type-box">
              <div class="type-kicker" id="resultModeKicker">您的工伤诊断</div>
              <div class="type-name" id="resultTypeName">副歌依赖症晚期</div>
              <div class="match" id="matchBadge">匹配度 92%</div>
              <div class="type-subname" id="resultTypeSub">系统备注会显示在这里。</div>
            </div>
          </div>

          <div class="analysis-box">
            <h3>详细诊断报告</h3>
            <p id="resultDesc"></p>
          </div>

          <div class="dim-box">
            <h3>十二维度评分</h3>
            <div id="dimList" class="dim-list"></div>
          </div>

          <div class="note-box">
            <h3>友情提示</h3>
            <p id="funNote">本测试仅供娱乐，别拿它当诊断、面试、相亲、分手、招魂、算命或人生判决书。</p>
          </div>
        </div>

        <div class="result-actions">
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="restartBtn" class="btn-secondary">重新鉴定</button>
            <button id="toTopBtn" class="btn-primary">回到首页</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const dimensionMeta = {
      D1: { name: 'D1 听歌依赖度', model: '依赖模型' },
      D2: { name: 'D2 循环成瘾性', model: '依赖模型' },
      D3: { name: 'D3 平台忠诚度', model: '依赖模型' },
      E1: { name: 'E1 情感投射深度', model: '情绪模型' },
      E2: { name: 'E2 深夜emo指数', model: '情绪模型' },
      E3: { name: 'E3 前任阴影残留', model: '情绪模型' },
      O1: { name: 'O1 歌单管理强迫度', model: '秩序模型' },
      O2: { name: 'O2 切歌冲动阈值', model: '秩序模型' },
      O3: { name: 'O3 小众审美执念', model: '秩序模型' },
      I1: { name: 'I1 现实沉浸偏差', model: '幻觉模型' },
      I2: { name: 'I2 自我表演倾向', model: '幻觉模型' },
      I3: { name: 'I3 歌词过度解读', model: '幻觉模型' }
    };

    const questions = [
      {
        id: 'q1', dim: 'D1',
        text: '你出门忘带耳机了，此时你的心理状态最接近：',
        options: [
          { label: '没事，安静也挺好', value: 1 },
          { label: '有点不习惯，但能忍', value: 2 },
          { label: '立刻掉头回家拿，没有耳机我无法呼吸', value: 3 }
        ]
      },
      {
        id: 'q2', dim: 'D1',
        text: '你每天戴耳机的时间大约是：',
        options: [
          { label: '1-2小时，偶尔听听', value: 1 },
          { label: '3-5小时，通勤+工作时听', value: 2 },
          { label: '除了睡觉和洗澡，耳机焊在耳朵上', value: 3 }
        ]
      },
      {
        id: 'q3', dim: 'D2',
        text: '你发现自己喜欢的歌后，通常会：',
        options: [
          { label: '加入歌单，随机听到时再享受', value: 1 },
          { label: '连续听几天，腻了就换', value: 2 },
          { label: '单曲循环到室友/同事想报警，听到这首歌的每个音符都刻进DNA', value: 3 }
        ]
      },
      {
        id: 'q4', dim: 'D2',
        text: '听一首歌时，副歌结束你的手指会：',
        options: [
          { label: '自然地等下一首', value: 1 },
          { label: '有时候会拖回去再听一遍副歌', value: 2 },
          { label: '不受控制地拖回副歌开头，循环5遍后才勉强放过这首歌', value: 3 }
        ]
      },
      {
        id: 'q5', dim: 'D3',
        text: '你的手机里装了几个音乐APP？',
        options: [
          { label: '好几个，哪个有版权用哪个', value: 1 },
          { label: '两个，一个主力一个备用', value: 2 },
          { label: '只有网易云，其他APP下载了也没打开过，我的红心和歌单都在这里', value: 3 }
        ]
      },
      {
        id: 'q6', dim: 'D3',
        text: '如果网易云突然宣布关闭服务器，你的第一反应是：',
        options: [
          { label: '换个APP呗，歌都差不多', value: 1 },
          { label: '有点难过，毕竟用了很久', value: 2 },
          { label: '天塌了。我那3000首红心、50个精心分类的歌单、500条走心评论……这不是关APP，这是烧我的精神遗产', value: 3 }
        ]
      },
      {
        id: 'q7', dim: 'E1',
        text: '听到一首特别扎心的歌时，你通常会：',
        options: [
          { label: '觉得旋律不错，听完就过了', value: 1 },
          { label: '有点感触，可能会单曲循环一会儿', value: 2 },
          { label: '眼泪直接掉下来，感觉自己的人生被这首歌完整地唱了一遍', value: 3 }
        ]
      },
      {
        id: 'q8', dim: 'E1',
        text: '你听歌时更关注什么？',
        options: [
          { label: '旋律和编曲，歌词随便听听', value: 1 },
          { label: '旋律和歌词各占一半', value: 2 },
          { label: '歌词。歌词就是我的日记本，每句话都在写我', value: 3 }
        ]
      },
      {
        id: 'q9', dim: 'E2',
        text: '晚上11点以后，你的歌单会发生什么变化？',
        options: [
          { label: '和白天差不多，该听什么听什么', value: 1 },
          { label: '可能会切换到稍微安静一点的歌', value: 2 },
          { label: '自动切换到"深夜emo"歌单，陈奕迅、林宥嘉、薛之谦轮番上阵，枕头湿了也不关', value: 3 }
        ]
      },
      {
        id: 'q10', dim: 'E2',
        text: '你在网易云评论区最常做的事是：',
        options: [
          { label: '偶尔看看热评，笑一笑就过了', value: 1 },
          { label: '认真看评论，偶尔点赞', value: 2 },
          { label: '从第一条刷到最后一条，两千楼的故事看完哭湿枕头，自己也写一段三千字的情感小作文', value: 3 }
        ]
      },
      {
        id: 'q11', dim: 'E3',
        text: '日推里突然出现你和前任一起听过的歌，你会：',
        options: [
          { label: '没感觉，正常听完', value: 1 },
          { label: '心里咯噔一下，但不会跳过', value: 2 },
          { label: '瞬间破防，立刻切歌，但歌词已经在脑子里循环了，今晚注定失眠', value: 3 }
        ]
      },
      {
        id: 'q12', dim: 'E3',
        text: '你有没有因为一首歌而想起某个人，然后情绪崩溃？',
        options: [
          { label: '没有，歌就是歌', value: 1 },
          { label: '偶尔会有点感触', value: 2 },
          { label: '何止一首歌？我的整个歌单都是按"前任编年史"排列的', value: 3 }
        ]
      },
      {
        id: 'q13', dim: 'O1',
        text: '你的歌单数量和分类方式是：',
        options: [
          { label: '几个大歌单，够用就行', value: 1 },
          { label: '十几个歌单，按心情/场景分了类', value: 2 },
          { label: '50+歌单，每个都有严格命名规范，"深夜独处·雨天·第三类情绪·不允许在白天打开"这种级别', value: 3 }
        ]
      },
      {
        id: 'q14', dim: 'O1',
        text: '点红心之前你会犹豫吗？',
        options: [
          { label: '觉得好听就点，不纠结', value: 1 },
          { label: '会想一下"这首歌配不配"', value: 2 },
          { label: '必须经过三轮审核：初听→二刷→三品，确认这首歌能进我的"灵魂歌单"才郑重点下红心，点错了还会取消', value: 3 }
        ]
      },
      {
        id: 'q15', dim: 'O2',
        text: '一首歌的前奏你通常能忍多久？',
        options: [

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getVisibleQuestions() {
      const visible = [...app.shuffledQuestions];
      const gateIndex = visible.findIndex(q => q.id === 'wy_gate_q1');
      if (gateIndex !== -1 && app.answers['wy_gate_q1'] === 3) {
        visible.splice(gateIndex + 1, 0, specialQuestions[1]);
      }
      return visible;
    }

    function getQuestionMetaLabel(q) {
      if (q.special) return '补充题';
      return app.previewMode ? dimensionMeta[q.dim].name : '维度已隐藏';
    }

    function renderQuestions() {
      const visibleQuestions = getVisibleQuestions();
      questionList.innerHTML = '';
      visibleQuestions.forEach((q, index) => {
        const card = document.createElement('article');
        card.className = 'question';
        card.innerHTML = `
          <div class="question-meta">
            <div class="badge">第 ${index + 1} 题</div>
            <div>${getQuestionMetaLabel(q)}</div>
          </div>
          <div class="question-title">${q.text}</div>
          <div class="options">
            ${q.options.map((opt, i) => {
              const code = ['A', 'B', 'C', 'D'][i] || String(i + 1);
              const checked = app.answers[q.id] === opt.value ? 'checked' : '';
              return `
                <label class="option">
                  <input type="radio" name="${q.id}" value="${opt.value}" ${checked} />
                  <div class="option-code">${code}</div>
                  <div>${opt.label}</div>
                </label>
              `;
            }).join('')}
          </div>
        `;
        questionList.appendChild(card);
      });

      questionList.querySelectorAll('input[type="radio"]').forEach(input => {
        input.addEventListener('change', (e) => {
          const { name, value } = e.target;
          app.answers[name] = Number(value);

          if (name === 'wy_gate_q1') {
            if (Number(value) !== 3) {
              delete app.answers['wy_gate_q2'];
            }
            renderQuestions();
            return;
          }

          updateProgress();
        });
      });

      updateProgress();
    }

    function updateProgress() {
      const visibleQuestions = getVisibleQuestions();
      const total = visibleQuestions.length;
      const done = visibleQuestions.filter(q => app.answers[q.id] !== undefined).length;
      const percent = total ? (done / total) * 100 : 0;
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `${done} / ${total}`;
      const complete = done === total && total > 0;
      submitBtn.disabled = !complete;
      testHint.textContent = complete
        ? '已完成！现在提交查看您的工伤诊断报告。'
        : '请完成所有题目才能提交。工伤诊断需要全面评估。';
    }

    function sumToLevel(score) {
      if (score <= 3) return 'L';
      if (score === 4) return 'M';
      return 'H';
    }

    function levelNum(level) {
      return { L: 1, M: 2, H: 3 }[level];
    }

    function parsePattern(pattern) {
      return pattern.replace(/-/g, '').split('');
    }

    function getLifetimeTriggered(levels) {
      return app.answers['wy_gate_q1'] === 3
        && app.answers['wy_gate_q2'] === 3
        && levels['E2'] === 'H';
    }

    function computeResult() {
      const rawScores = {};
      const levels = {};
      Object.keys(dimensionMeta).forEach(dim => { rawScores[dim] = 0; });

      questions.forEach(q => {
        rawScores[q.dim] += Number(app.answers[q.id] || 0);
      });

      Object.entries(rawScores).forEach(([dim, score]) => {
        levels[dim] = sumToLevel(score);
      });

      const userVector = dimensionOrder.map(dim => levelNum(levels[dim]));
      const ranked = NORMAL_TYPES.map(type => {
        const vector = parsePattern(type.pattern).map(levelNum);
        let distance = 0;
        let exact = 0;
        for (let i = 0; i < vector.length; i++) {
          const diff = Math.abs(userVector[i] - vector[i]);
          distance += diff;
          if (diff === 0) exact += 1;
        }
        const similarity = Math.max(0, Math.round((1 - distance / 24) * 100));
        return { ...type, ...TYPE_LIBRARY[type.code], distance, exact, similarity };
      }).sort((a, b) => {
        if (a.distance !== b.distance) return a.distance - b.distance;
        if (b.exact !== a.exact) return b.exact - a.exact;
        return b.similarity - a.similarity;
      });

      const bestNormal = ranked[0];
      const lifetimeTriggered = getLifetimeTriggered(levels);

      let finalDiagnosis;
      let modeKicker = '您的工伤诊断';
      let badge = `匹配度 ${bestNormal.similarity}% · 精准命中 ${bestNormal.exact}/12 维`;
      let sub = '维度命中度较高，当前诊断结果可视为您的主要工伤类型。';
      let special = false;

      if (lifetimeTriggered) {
        finalDiagnosis = TYPE_LIBRARY.LIFETIME;
        modeKicker = '终身荣誉工伤已触发';
        badge = '匹配度 100% · 8年网易云老村民认证';
        sub = '您已在网抑云村生活太久，系统直接授予您终身荣誉工伤称号。';
        special = true;
      } else if (bestNormal.similarity < 60) {
        finalDiagnosis = TYPE_LIBRARY.ALLERGY;
        modeKicker = '系统强制兜底';
        badge = `标准工伤库最高匹配仅 ${bestNormal.similarity}%`;
        sub = '28种标准工伤都无法准确描述您的听歌习惯，系统判定您为\"音乐过敏体质\"。';
        special = true;
      } else {
        finalDiagnosis = bestNormal;
      }

      return {
        rawScores,
        levels,
        ranked,
        bestNormal,
        finalDiagnosis,
        modeKicker,
        badge,
        sub,
        special
      };
    }

    function renderDimList(result) {
      const dimList = document.getElementById('dimList');
      dimList.innerHTML = dimensionOrder.map(dim => {
        const level = result.levels[dim];
        const explanation = DIM_EXPLANATIONS[dim][level];
        return `
          <div class="dim-item">
            <div class="dim-item-top">
              <div class="dim-item-name">${dimensionMeta[dim].name}</div>
              <div class="dim-item-score">${level} / ${result.rawScores[dim]}分</div>
            </div>
            <p>${explanation}</p>
          </div>
        `;
      }).join('');
    }

    function renderResult() {
      const result = computeResult();
      const diagnosis = result.finalDiagnosis;

      document.getElementById('resultModeKicker').textContent = result.modeKicker;
      document.getElementById('resultTypeName').textContent = `${diagnosis.code}（${diagnosis.cn}）`;
      document.getElementById('matchBadge').textContent = result.badge;
      document.getElementById('resultTypeSub').textContent = result.sub;
      document.getElementById('resultDesc').textContent = diagnosis.desc;
      document.getElementById('posterCaption').textContent = diagnosis.intro;
      document.getElementById('funNote').textContent = result.special
        ? '本测试仅供娱乐。终身荣誉工伤和音乐过敏体质都是作者故意埋的彩蛋，请不要当真。'
        : '本测试仅供娱乐。工伤诊断只是玩笑，请不要当真。祝大家听歌愉快！';

      const posterBox = document.getElementById('posterBox');
      const posterImage = document.getElementById('posterImage');
      const imageSrc = TYPE_IMAGES[diagnosis.code];
      if (imageSrc) {
        posterImage.src = imageSrc;
        posterImage.alt = `${diagnosis.code}（${diagnosis.cn}）`;
        posterBox.classList.remove('no-image');
      } else {
        posterImage.removeAttribute('src');
        posterImage.alt = '';
        posterBox.classList.add('no-image');
      }

      renderDimList(result);
      showScreen('result');
    }

    function startTest(preview = false) {
      app.previewMode = preview;
      app.answers = {};
      const shuffledRegular = shuffle(questions);
      const insertIndex = Math.floor(Math.random() * shuffledRegular.length) + 1;
      app.shuffledQuestions = [
        ...shuffledRegular.slice(0, insertIndex),
        specialQuestions[0],
        ...shuffledRegular.slice(insertIndex)
      ];
      renderQuestions();
      showScreen('test');
    }

    document.getElementById('startBtn').addEventListener('click', () => startTest(false));
    document.getElementById('backIntroBtn').addEventListener('click', () => showScreen('intro'));
    document.getElementById('submitBtn').addEventListener('click', renderResult);
    document.getElementById('restartBtn').addEventListener('click', () => startTest(false));
    document.getElementById('toTopBtn').addEventListener('click', () => showScreen('intro'));
  </script>
</body>
</html>
